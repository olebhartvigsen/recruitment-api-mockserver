name: Scrape AU Job Postings

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Newline-separated AU job posting URLs (e.g. https://www.au.dk/om/stillinger/job/...)"
        required: true
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape and generate mock data
        env:
          URLS: ${{ inputs.urls }}
        run: python .github/scripts/scrape_jobs.py

      - name: Commit new mock data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiremock/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: add scraped job postings from AU website

Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push
          fi
